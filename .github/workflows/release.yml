name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun run build
      - run: bun test
      - name: Check for pending changesets
        id: changesets
        run: |
          if ls .changeset/*.md 1>/dev/null 2>&1 && [ "$(ls .changeset/*.md | grep -v README.md)" ]; then
            echo "pending=true" >> $GITHUB_OUTPUT
          else
            echo "pending=false" >> $GITHUB_OUTPUT
            echo "No pending changesets, skipping release"
          fi
      - name: Version packages
        if: steps.changesets.outputs.pending == 'true'
        run: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit and push version bumps
        if: steps.changesets.outputs.pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release packages" || echo "No changes to commit"
          git push
      - name: Publish to npm
        if: steps.changesets.outputs.pending == 'true'
        run: |
          npm config set provenance true
          bunx changeset publish
        env:
          NODE_AUTH_TOKEN: ""
