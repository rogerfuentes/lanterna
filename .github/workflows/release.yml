name: Release
on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun run build
      - run: bun test
      - name: Version packages
        run: bunx changeset version
      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --workspaces --access public --provenance
