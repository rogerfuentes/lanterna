name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_missing:
        description: "Publish packages with unpublished versions"
        type: boolean
        default: false

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"

      - run: bun install
      - run: bun run build
      - run: bun test

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run scripts/resolve-workspace-deps.ts && bunx changeset publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish missing packages (manual recovery)
        if: inputs.publish_missing == true
        run: |
          for pkg in packages/*; do
            [ -f "$pkg/package.json" ] || continue
            NAME=$(node -p "require('./$pkg/package.json').name")
            VERSION=$(node -p "require('./$pkg/package.json').version")
            PRIVATE=$(node -p "require('./$pkg/package.json').private || false")
            [ "$PRIVATE" = "true" ] && continue
            PUBLISHED=$(npm view "$NAME@$VERSION" version 2>/dev/null || echo "")
            if [ -z "$PUBLISHED" ]; then
              echo "Publishing $NAME@$VERSION..."
              cd "$GITHUB_WORKSPACE/$pkg"
              npm publish --access public --provenance
              cd "$GITHUB_WORKSPACE"
            else
              echo "$NAME@$VERSION already on npm, skipping."
            fi
          done
