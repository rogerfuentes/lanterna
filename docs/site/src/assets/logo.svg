<svg xmlns="http://www.w3.org/2000/svg" width="180" height="32" viewBox="0 0 180 32" fill="none">
  <!-- Power Battery - Front view inspired by Green Lantern charge device -->

  <!-- Base/pedestal -->
  <path d="M10 28 Q10 26 12 26 L20 26 Q22 26 22 28 L22 29 L10 29 Z" fill="#2d7a4f"/>

  <!-- Main body - circular front face -->
  <circle cx="16" cy="16" r="10" fill="#3a8f5c" stroke="#2d7a4f" stroke-width="1.5"/>

  <!-- Glass lens ring -->
  <circle cx="16" cy="16" r="7.5" fill="#1a5c35" stroke="#4aad6e" stroke-width="0.8"/>

  <!-- Glowing green orb center -->
  <circle cx="16" cy="16" r="5" fill="#34d399"/>
  <circle cx="16" cy="16" r="3.5" fill="#6ee7b7"/>
  <circle cx="16" cy="16" r="1.8" fill="#a7f3d0"/>

  <!-- Side nozzles (left and right) -->
  <path d="M6 13 L3 11 Q1 10 1 12 L1 14 Q1 16 3 16 L6 15 Z" fill="#3a8f5c" stroke="#2d7a4f" stroke-width="0.8"/>
  <path d="M26 13 L29 11 Q31 10 31 12 L31 14 Q31 16 29 16 L26 15 Z" fill="#3a8f5c" stroke="#2d7a4f" stroke-width="0.8"/>

  <!-- Top cap -->
  <rect x="11" y="4" width="10" height="3" rx="1.5" fill="#3a8f5c" stroke="#2d7a4f" stroke-width="0.8"/>

  <!-- Handle arc -->
  <path d="M12 5 Q16 -3 20 5" stroke="#2d7a4f" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Top lantern symbol (small circle on cap) -->
  <circle cx="16" cy="5.5" r="1.2" fill="#2d7a4f" stroke="#4aad6e" stroke-width="0.5"/>
  <circle cx="16" cy="5.5" r="0.5" fill="#34d399"/>

  <!-- "Lanterna" text -->
  <text x="38" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="white">Lanterna</text>
</svg>
